<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard AI | Phishing Detector</title>
    <!-- Use URL Scam Font and Stylesheet for matching white theme -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='url_scam/style.css') }}">
    <style>
        .dashboard-grid {
            grid-template-columns: 1fr;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        .file-upload-container {
            margin-bottom: 20px; 
            border: 2px dashed var(--input-border); 
            border-radius: 12px; 
            padding: 40px 20px; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.2s ease;
            background: var(--pill-idle-bg);
        }
        .file-upload-container:hover {
            border-color: var(--primary);
            background: var(--card-bg);
        }
        .file-upload-text {
            margin: 0; 
            color: var(--text-soft); 
            font-weight: 500; 
            font-size: 1.05rem;
        }
        #file-name-display {
            margin-top: 15px; 
            font-size: 0.95rem; 
            color: var(--primary-dark); 
            font-weight: 600;
        }
        .hidden { display: none !important; }
        .loader {
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 2px solid white;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #result-content {
            color: var(--text-main);
            line-height: 1.6;
            font-size: 1rem;
        }
        #result-content h1, #result-content h2, #result-content h3 {
            color: var(--text-main);
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }
        #result-content p {
            margin-bottom: 1rem;
        }

        /* Missing Verdict & Circular Graph Styles for White Theme */
        .verdict {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            border: 2px solid transparent;
        }
        .verdict-phishing {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.4);
        }
        .verdict-safe {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.4);
        }

        .risk-graph-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .circular-chart {
            display: block;
            margin: 10px auto;
            max-width: 150px;
            max-height: 150px;
        }
        .circle-bg {
            fill: none;
            stroke: rgba(0, 0, 0, 0.1);
            stroke-width: 3.8;
        }
        .circle {
            fill: none;
            stroke-width: 3.8;
            stroke-linecap: round;
            animation: progress 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes progress { 0% { stroke-dasharray: 0 100; } }
        .circular-chart.low-risk .circle { stroke: #10b981; }
        .circular-chart.medium-risk .circle { stroke: #fbbf24; }
        .circular-chart.high-risk .circle { stroke: #ef4444; }
        .percentage {
            fill: #0a2540;
            font-family: 'Inter', sans-serif;
            font-size: 0.55em;
            text-anchor: middle;
            font-weight: 700;
        }
        .risk-label {
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .risk-label.low-risk { color: #10b981; }
        .risk-label.medium-risk { color: #fbbf24; }
        .risk-label.high-risk { color: #ef4444; }
    </style>
    <style>
        body { background: transparent !important; }
        #cloud-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle at 10% 20%, rgba(219, 234, 254, 0.45) 0%, rgba(255, 255, 255, 1) 90%);
        }
    </style>
</head>
<body>
    <a href="/" style="position: fixed; top: 20px; left: 20px; display: flex; align-items: center; gap: 8px; text-decoration: none; color: #5d7fa1; font-weight: 500; font-size: 0.95rem; z-index: 9999; font-family: 'Inter', sans-serif; transition: color 0.2s;" onmouseover="this.style.color='#4ca6ff'" onmouseout="this.style.color='#5d7fa1'">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Home
    </a>
    <div class="page-shell">
        <main class="dashboard-grid">
            <section class="panel input-panel">
                <div class="panel-heading">
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        </svg>
                        <h2 style="margin: 0; font-size: 1.8rem; color: var(--text-main);">PhishGuard AI</h2>
                    </div>
                    <p style="color: var(--text-soft); font-size: 1.05rem;">Advanced Phishing Detection via Gemini & RAG. Upload an email PDF to analyze.</p>
                </div>

                <div class="scan-form" style="margin-top: 2rem;">
                    <label class="input-label" style="margin-bottom: 1rem; display: block;">Upload Email PDF</label>
                    <div class="file-upload-container" onclick="document.getElementById('email-file').click();">
                        <p class="file-upload-text">Click to select a PDF or drag and drop</p>
                        <input type="file" id="email-file" accept=".pdf" style="display: none;" onchange="document.getElementById('file-name-display').textContent = this.files[0] ? this.files[0].name : 'No file chosen';" />
                        <p id="file-name-display"></p>
                    </div>
                    <div class="input-row" style="margin-top: 1.5rem;">
                        <button id="analyze-btn" type="button" style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 14px; font-size: 1.1rem;">
                            <span class="btn-text">Scan for Phishing</span>
                            <span class="loader hidden"></span>
                        </button>
                    </div>
                </div>
            </section>

            <section class="panel result-panel hidden" id="result-section">
                <div class="panel-heading">
                    <h2>Analysis Result</h2>
                    <p>Detailed breakdown of the email's contents and threat level.</p>
                </div>
                <div id="result-content"></div>
            </section>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="{{ url_for('static', filename='email/script.js') }}"></script>
    <!-- Canvas Cloud Background -->
    <canvas id="cloud-canvas"></canvas>
    <script>
    (function() {
        var canvas = document.getElementById('cloud-canvas');
        var ctx = canvas.getContext('2d');
        var t = 0;

        var dpr = window.devicePixelRatio || 1;
        function resize() {
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
        }
        resize();
        window.addEventListener('resize', resize);

        function drawCloud(cx, cy, scale, alpha) {
            var puffs = [
                [0,     0,    95, 60], [85,   -30,   78, 52], [165,    5,   72, 48],
                [240,  -10,   65, 44], [-70,   12,   68, 46], [55,   -68,   65, 42],
                [130,  -58,   58, 40], [200,  -40,   52, 36], [310,    2,   58, 38],
                [-130,  20,   52, 35], [20,   -35,   45, 30], [90,   -80,   38, 25],
                [170,  -75,   35, 22], [270,  -30,   42, 28]
            ];
            ctx.save(); ctx.scale(dpr, dpr);
            puffs.forEach(function(p) {
                var rx = p[2] * scale, ry = p[3] * scale;
                var px = cx + p[0] * scale, py = cy + p[1] * scale;
                var gOuter = ctx.createRadialGradient(px, py, 0, px, py, rx * 1.3);
                gOuter.addColorStop(0, 'rgba(230,240,255,' + (alpha * 0.18) + ')');
                gOuter.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.beginPath(); ctx.ellipse(px, py, rx * 1.3, ry * 1.3, 0, 0, Math.PI * 2);
                ctx.fillStyle = gOuter; ctx.fill();

                var g = ctx.createRadialGradient(px, py - ry * 0.15, 0, px, py, rx);
                g.addColorStop(0, 'rgba(248,251,255,' + alpha + ')');
                g.addColorStop(0.4, 'rgba(235,244,255,' + (alpha * 0.9) + ')');
                g.addColorStop(0.75, 'rgba(220,235,255,' + (alpha * 0.6) + ')');
                g.addColorStop(1, 'rgba(210,228,255,0)');
                ctx.beginPath(); ctx.ellipse(px, py, rx, ry, 0, 0, Math.PI * 2);
                ctx.fillStyle = g; ctx.fill();
            });
            ctx.restore();
        }

        var clouds = [
            { x: 100, baseY: 0.05, scale: 0.55, speed: 0.12, alpha: 0.28, bobAmp: 0.9, bobFreq: 0.02 },
            { x: 600, baseY: 0.15, scale: 0.50, speed: 0.10, alpha: 0.22, bobAmp: 0.7, bobFreq: 0.015 },
            { x: 1100, baseY: 0.12, scale: 0.58, speed: 0.13, alpha: 0.25, bobAmp: 1.1, bobFreq: 0.025 },
            { x: -300, baseY: 0.25, scale: 0.52, speed: 0.11, alpha: 0.20, bobAmp: 0.8, bobFreq: 0.018 },
            { x: 0, baseY: 0.35, scale: 0.85, speed: 0.22, alpha: 0.40, bobAmp: 1.5, bobFreq: 0.03 },
            { x: 500, baseY: 0.45, scale: 0.90, speed: 0.20, alpha: 0.38, bobAmp: 1.2, bobFreq: 0.025 },
            { x: 1000, baseY: 0.40, scale: 0.80, speed: 0.25, alpha: 0.42, bobAmp: 1.8, bobFreq: 0.035 },
            { x: -200, baseY: 0.55, scale: 0.88, speed: 0.18, alpha: 0.35, bobAmp: 1.3, bobFreq: 0.02 },
            { x: 800, baseY: 0.30, scale: 0.75, speed: 0.24, alpha: 0.36, bobAmp: 1.0, bobFreq: 0.03 },
            { x: 200, baseY: 0.65, scale: 1.20, speed: 0.38, alpha: 0.55, bobAmp: 2.2, bobFreq: 0.04 },
            { x: 750, baseY: 0.75, scale: 1.30, speed: 0.42, alpha: 0.52, bobAmp: 1.9, bobFreq: 0.035 },
            { x: 1300, baseY: 0.70, scale: 1.10, speed: 0.35, alpha: 0.50, bobAmp: 2.5, bobFreq: 0.045 },
            { x: -400, baseY: 0.85, scale: 1.25, speed: 0.40, alpha: 0.48, bobAmp: 2.0, bobFreq: 0.04 },
            { x: 400, baseY: 0.95, scale: 1.15, speed: 0.39, alpha: 0.53, bobAmp: 2.1, bobFreq: 0.038 }
        ];

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); t++;
            clouds.forEach(function(c) {
                var bY = c.baseY * window.innerHeight + Math.sin(t * c.bobFreq) * c.bobAmp;
                var fadeW = 280, edgeFade = 1;
                if (c.x < fadeW) edgeFade = Math.max(0, c.x / fadeW);
                if (c.x > window.innerWidth - fadeW) edgeFade = Math.max(0, (window.innerWidth - c.x) / fadeW);
                drawCloud(c.x, bY, c.scale, c.alpha * edgeFade);
                c.x += c.speed;
                if (c.x > window.innerWidth + 550) { c.x = -520; c.baseY = Math.random(); }
            });
            requestAnimationFrame(animate);
        }
        animate();
    })();
    </script>
</body>
</html>
